name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    name: Python functions (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # matches the 2nd-gen Cloud Functions runtime
          cache: pip
          cache-dependency-path: functions/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -v

  flutter:
    name: Flutter app (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable # provides a Dart SDK >= 3.3 (see pubspec environment)
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # Runs even if tests fail so a single push surfaces both test and
      # analyzer problems at once.
      - name: Analyze
        if: always()
        run: flutter analyze
