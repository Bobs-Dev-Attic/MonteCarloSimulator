name: monte_carlo_simulator
description: Monte Carlo financial simulator (Flutter + Firebase).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  cloud_functions: ^6.3.2
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^3.3.1

  # Charting (fan chart + histogram)
  fl_chart: ^1.2.0

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
