name: monte_carlo_simulator
description: Monte Carlo financial simulator (Flutter + Firebase).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Charting (fan chart + histogram)
  fl_chart: ^0.69.0

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
